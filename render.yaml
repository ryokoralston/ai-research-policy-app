services:
  - type: web
    name: ai-research-policy-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('sentence-transformers/all-MiniLM-L6-v2')"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: starter
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/research.db
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma
      - key: UPLOADS_DIR
        value: /data/uploads
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # Optional: urlsafe-base64 Fernet key for encrypting stored secrets at rest.
      # If unset, a key file is auto-generated on the mounted /data disk.
      # Generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      - key: SECRET_ENCRYPTION_KEY
        sync: false
