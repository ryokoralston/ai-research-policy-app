name: Dependency vulnerability audit

on:
  push:
    branches: [main]
    paths:
      - "backend/requirements.txt"
      - "frontend/package-lock.json"
      - ".github/workflows/dependency-audit.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/requirements.txt"
      - "frontend/package-lock.json"
      - ".github/workflows/dependency-audit.yml"
  schedule:
    # Catches newly-disclosed CVEs in already-pinned versions, not just new commits.
    - cron: "0 13 * * 1" # every Monday
  workflow_dispatch:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Upgrade pip and setuptools
        # setuptools isn't in requirements.txt (it's bundled build tooling,
        # not a project dependency) but pip-audit still flags whatever
        # version the runner's Python install shipped with, so it needs its
        # own explicit upgrade here.
        run: pip install --upgrade pip setuptools
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        # No `pipx run` here on purpose: that spins up its own isolated venv
        # containing only pip-audit itself, so it audits an empty environment
        # instead of the project's dependencies (always reports "no known
        # vulnerabilities found" regardless of what's actually pinned).
        # Running plain `pip-audit` in this same environment, right after
        # installing the project's requirements.txt into it, audits what's
        # actually installed.
        #
        # --ignore-vuln: transformers is capped at <5.0.0 by
        # sentence-transformers==3.3.1's own pin (see requirements.txt) —
        # these 4 have no fix in the 4.x line, and unlocking 5.x risks
        # changing embedding output and invalidating the existing ChromaDB
        # index, so it's a deliberate, documented, separate follow-up rather
        # than something to fix here. Ignored explicitly so this check stays
        # a useful signal for *new* vulnerabilities instead of being
        # permanently red over a known one.
        run: |
          pip-audit --strict --progress-spinner=off \
            --ignore-vuln PYSEC-2025-217 \
            --ignore-vuln PYSEC-2026-2290 \
            --ignore-vuln PYSEC-2026-2288 \
            --ignore-vuln PYSEC-2026-2289

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run npm audit (high/critical only)
        working-directory: frontend
        run: npm audit --audit-level=high
